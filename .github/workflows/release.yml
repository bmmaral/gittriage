name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  HOMEBREW_TAP_REPO: ${{ github.repository_owner }}/homebrew-gittriage
  SCOOP_BUCKET_REPO: ${{ github.repository_owner }}/scoop-gittriage

jobs:
  linux-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - run: rustup target add x86_64-unknown-linux-musl

      - name: Build static CLI (musl)
        env:
          CC: x86_64-linux-musl-gcc
        run: cargo build --release --target x86_64-unknown-linux-musl -p gittriage

      - name: Stage artifacts
        run: |
          BIN=target/x86_64-unknown-linux-musl/release/gittriage
          cp "$BIN" "gittriage-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl"
          sha256sum "gittriage-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl" | awk '{print $1}' > "gittriage-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl.sha256"

          for sh in bash zsh fish; do
            "$BIN" completions "$sh" > "gittriage.${sh}"
          done
          tar czf "gittriage-${GITHUB_REF_NAME}-completions.tar.gz" gittriage.bash gittriage.zsh gittriage.fish

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gittriage-${{ github.ref_name }}-x86_64-unknown-linux-musl
            gittriage-${{ github.ref_name }}-x86_64-unknown-linux-musl.sha256
            gittriage-${{ github.ref_name }}-completions.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Single macOS runner: native arm64 + cross x86_64 (avoids macos-13 Intel runner deprecation/cancellation).
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build CLI (Apple Silicon, native)
        run: cargo build --release -p gittriage

      - name: Build CLI (Intel, cross-compile)
        run: cargo build --release --target x86_64-apple-darwin -p gittriage

      - name: Stage artifacts
        run: |
          cp "target/release/gittriage" "gittriage-${GITHUB_REF_NAME}-aarch64-apple-darwin"
          shasum -a 256 "gittriage-${GITHUB_REF_NAME}-aarch64-apple-darwin" | awk '{print $1}' > "gittriage-${GITHUB_REF_NAME}-aarch64-apple-darwin.sha256"
          cp "target/x86_64-apple-darwin/release/gittriage" "gittriage-${GITHUB_REF_NAME}-x86_64-apple-darwin"
          shasum -a 256 "gittriage-${GITHUB_REF_NAME}-x86_64-apple-darwin" | awk '{print $1}' > "gittriage-${GITHUB_REF_NAME}-x86_64-apple-darwin.sha256"

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gittriage-${{ github.ref_name }}-aarch64-apple-darwin
            gittriage-${{ github.ref_name }}-aarch64-apple-darwin.sha256
            gittriage-${{ github.ref_name }}-x86_64-apple-darwin
            gittriage-${{ github.ref_name }}-x86_64-apple-darwin.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p gittriage

      - name: Stage artifact
        shell: bash
        run: |
          cp target/release/gittriage.exe "gittriage-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.exe"
          sha256sum "gittriage-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.exe" | awk '{print $1}' > "gittriage-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.exe.sha256"

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gittriage-${{ github.ref_name }}-x86_64-pc-windows-msvc.exe
            gittriage-${{ github.ref_name }}-x86_64-pc-windows-msvc.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-homebrew-tap:
    needs: [linux-musl, macos, windows]
    runs-on: ubuntu-latest
    if: secrets.HOMEBREW_TAP_TOKEN != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Render Homebrew formula
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python packaging/scripts/bump_release_packaging.py homebrew > gittriage.rb
      - name: Push to tap
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -eux
          git clone "https://x-access-token:${TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" tap
          mkdir -p tap/Formula
          cp gittriage.rb tap/Formula/gittriage.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/gittriage.rb
          if git commit -m "gittriage ${GITHUB_REF_NAME}"; then
            git push
          else
            echo "No formula changes to commit."
          fi

  publish-scoop-bucket:
    needs: [linux-musl, macos, windows]
    runs-on: ubuntu-latest
    if: secrets.SCOOP_BUCKET_TOKEN != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update manifest and push bucket
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          set -eux
          python packaging/scripts/bump_release_packaging.py scoop
          git clone "https://x-access-token:${TOKEN}@github.com/${SCOOP_BUCKET_REPO}.git" bucket-repo
          mkdir -p bucket-repo/bucket
          cp packaging/scoop/gittriage.json bucket-repo/bucket/gittriage.json
          cd bucket-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/gittriage.json
          if git commit -m "gittriage ${GITHUB_REF_NAME}"; then
            git push
          else
            echo "No manifest changes to commit."
          fi

  publish-chocolatey:
    needs: [linux-musl, macos, windows]
    runs-on: windows-latest
    if: secrets.CHOCOLATEY_API_KEY != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bump Chocolatey package files
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python packaging/scripts/bump_release_packaging.py chocolatey
      - name: Pack and push to Chocolatey
        working-directory: packaging/chocolatey
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          choco pack
          $nupkg = Get-ChildItem -Filter *.nupkg | Select-Object -First 1
          choco push $nupkg.FullName --source https://push.chocolatey.org/ --api-key $env:CHOCOLATEY_API_KEY
        shell: pwsh
