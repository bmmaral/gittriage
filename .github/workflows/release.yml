name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  linux-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - run: rustup target add x86_64-unknown-linux-musl

      - name: Build static CLI (musl)
        env:
          CC: x86_64-linux-musl-gcc
        run: cargo build --release --target x86_64-unknown-linux-musl -p nexus-cli

      - name: Stage artifact name
        run: |
          cp target/x86_64-unknown-linux-musl/release/nexus \
            "nexus-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl"

      - name: Upload nexus (linux musl x86_64)
        uses: softprops/action-gh-release@v2
        with:
          files: nexus-${{ github.ref_name }}-x86_64-unknown-linux-musl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
